modbus_controller:
  - id: inverter${inverter_id}_modbus_controller
    modbus_id: ${inverter_modbus_id}
    address: ${inverter_modbus_address}
    update_interval: ${inverter_update_interval}
    setup_priority: -10
    offline_skip_updates: 10

packages:
  inverter_sensors: !include inverter_solis_eh1_sensors.yaml
  inverter_controls: !include inverter_solis_eh1_controls.yaml
  inverter_rtc: !include inverter_solis_eh1_rtc.yaml
  inverter_schedule: !include inverter_solis_eh1_smart_schedule.yaml
  inverter_base: !include inverter_base.yaml
