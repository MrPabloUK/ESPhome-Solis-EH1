solis_schedule_manager:
  alias: 'Solis: Create/Edit Schedule'
  icon: mdi:calendar-edit
  description: Create or update inverter schedule slots via ESPHome
  fields:
    slot_num:
      name: Slot Number
      description: Select slot (1-12). Slot 1 has the highest priority.
      required: true
      default: 1
      selector:
        number:
          min: 1
          max: 12
          mode: box
    op_mode:
      name: Operation Mode
      required: true
      default: '1'
      selector:
        select:
          options:
          - label: Charge
            value: '1'
          - label: Discharge
            value: '2'
    start_t:
      name: Start Time
      required: true
      default: 00:00:00
      selector:
        time: {}
    end_t:
      name: End Time
      required: true
      default: 00:00:00
      selector:
        time: {}
    target_soc:
      name: Target SOC to charge or discharge to.
      required: true
      default: 100
      selector:
        number:
          min: 10
          max: 100
          unit_of_measurement: '%'
    limit_watts:
      name: Power Limit
      description: Set to 0 for unlimited power.
      required: true
      default: 0
      selector:
        number:
          min: 0
          max: 6000
          unit_of_measurement: W
    repeat_day:
      name: Repeat Daily
      required: true
      default: false
      selector:
        boolean: {}
  sequence:
  - action: esphome.solisinverter_inverter1_upsert_schedule
    data:
      Slot_Number: '{{ slot_num | int }}'
      Operation_Mode: '{{ op_mode | int }}'
      Start_Hour: '{{ start_t.split('':'')[0] | int }}'
      Start_Minute: '{{ start_t.split('':'')[1] | int }}'
      End_Hour: '{{ end_t.split('':'')[0] | int }}'
      End_Minute: '{{ end_t.split('':'')[1] | int }}'
      Target_SOC_Percent: '{{ target_soc | int }}'
      Power_Limit_Watts: '{{ limit_watts | int }}'
      Repeat_Daily: '{{ repeat_day }}'
  mode: single
solis_schedule_slot_control:
  alias: 'Solis: Schedule Slot Control'
  icon: mdi:list-status
  description: Manage inverter schedule slots status
  fields:
    action_type:
      name: Action
      required: true
      default: reactivate
      selector:
        select:
          options:
          - label: Resume
            value: reactivate
          - label: Pause
            value: disable
          - label: Delete
            value: delete
    slot_num:
      name: Slot Number
      required: true
      default: 1
      selector:
        number:
          min: 1
          max: 12
          mode: box
  sequence:
  - action: esphome.solisinverter_inverter1_manage_slot_status
    data:
      Slot_Number: '{{ slot_num | int }}'
      Instruction: '{% set mapper = {''delete'': 0, ''disable'': 1, ''reactivate'':
        2} %} {{ mapper[action_type] }}'
  mode: single