type: vertical-stack
cards:
  - type: markdown
    title: Inverter Schedules
    content: >-
      | Slot | Status | Mode | Time Window | SOC | Power | Repeat |

      |:---:|:---:|:---:|:---:|:---:|:---:|:---:|

      {%- set data = state_attr('sensor.solis_master_schedule', 'data') %}

      {%- if data is not none and data is iterable %}
        {%- for s in data %}
          {%- if s.Mode == 'Idle' or s.Mode == '' %}
            {%- set status = '-' %}
            {%- set mode, times, soc, pwr, rep = '-', '-', '-', '-', '-' %}
          {%- else %}
            {%- set status = '✅' if s.Active else '⏸' %}
            {%- set mode = s.Mode %}
            {%- set times = s['Start Time'] ~ " - " ~ s['End Time'] %}
            {%- set soc = s['Target SOC'] ~ "%" %}
            {%- set pwr = (s.Power ~ "W") if (s.Power | int) > 0 else "∞" %}
            {%- set rep = '✅' if s.Repeat else '❌' %}
          {%- endif %}
      | {{ s.Slot }} | {{ status }} | {{ mode }} | {{ times }} | {{ soc }} | {{
      pwr }} | {{ rep }} |
        {%- endfor %}
      {%- else %}

      | | | No data received yet | | | | |

      {%- endif %}
  - type: entities
    show_header_toggle: false
    entities:
      - entity: script.solis_schedule_manager
        name: Setup or Edit Slot
        action_name: CONFIGURE
      - entity: script.solis_schedule_slot_control
        name: Pause / Resume / Delete Slot
        action_name: CONFIGURE